[project]
name = "jalaagent-skill-core"
version = "0.1.0"
description = "Skill system for JalaAgent — SKILL.md loader, workshop, security scanner, hub"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skill_core"]
