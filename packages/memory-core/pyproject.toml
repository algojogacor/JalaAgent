[project]
name = "jalaagent-memory-core"
version = "2026.6.18"
description = "Hybrid memory system for JalaAgent — file layer + sqlite-vec + dreaming pipeline"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings",
    "sqlite-vec",
    "watchfiles",
    "httpx",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memory_core"]
