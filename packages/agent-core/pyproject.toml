[project]
name = "jalaagent-agent-core"
version = "2026.6.18"
description = "Core agent loop, provider abstraction, and tool registry for JalaAgent"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings",
    "httpx>=0.28.1",
]

[project.optional-dependencies]
mcp = ["mcp"]
browser = ["playwright>=1.60.0"]
gemini = ["google-genai>=2.8.0"]
all = [
    "mcp",
    "playwright>=1.60.0",
    "google-genai>=2.8.0",
]
dev = [
    "pytest",
    "pytest-asyncio",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_core"]
