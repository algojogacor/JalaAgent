[project]
name = "jalaagent-agent-core"
version = "0.1.0"
description = "Core agent loop, provider abstraction, and tool registry for JalaAgent"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings",
    "mcp",
    "playwright>=1.60.0",
    "google-genai>=2.8.0",
    "httpx>=0.28.1",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_core"]
